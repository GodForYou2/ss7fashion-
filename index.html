<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S7 Fashion Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased pb-10">

    <div class="max-w-md mx-auto px-4 pt-4">
        <div class="bg-gradient-to-r from-violet-600 to-indigo-600 rounded-2xl p-5 shadow-xl text-white mb-5 text-center">
            <h1 id="app-title" class="text-xl font-bold tracking-wide">📊 S&S7 FASHION</h1>
            <p class="text-xs text-indigo-100 mt-1">Real-time Financial Analytics</p>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-xs text-center">
                <span class="text-xs text-slate-400 block font-medium">💰 စုစုပေါင်းရောင်းရငွေ</span>
                <span id="total-sell" class="text-lg font-bold text-slate-800">0 MMK</span>
            </div>
            <div class="bg-emerald-50 border border-emerald-100 rounded-xl p-4 shadow-xs text-center">
                <span class="text-xs text-emerald-600 block font-medium">📈 အသားတင်အမြတ်</span>
                <span id="total-profit" class="text-lg font-bold text-emerald-700">0 MMK</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl p-4 shadow-xs border border-slate-100 mb-6">
            <h2 class="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">📈 အရောင်းခွဲခြမ်းစိတ်ဖြာမှု ပြဂရပ်ဖ်</h2>
            <div class="relative w-full h-48">
                <canvas id="analyticsChart"></canvas>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xs border border-slate-100 overflow-hidden">
            <div class="px-4 py-3 bg-slate-100 border-b border-slate-200">
                <h2 class="text-sm font-bold text-slate-600">📝 အသေးစိတ် အရောင်းစာရင်း</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-100 text-xs text-slate-400 uppercase font-semibold">
                            <th class="py-3 px-4">ပစ္စည်း / ရက်စွဲ</th>
                            <th class="py-3 px-4 text-center">ခုရေ</th>
                            <th class="py-3 px-4 text-right">ရောင်းရငွေ</th>
                            <th class="py-3 px-4 text-right text-emerald-600">အမြတ်</th>
                        </tr>
                    </thead>
                    <tbody id="data-rows" class="text-sm divide-y divide-slate-100 text-slate-600">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp UI
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }

        // --- 🔒 BURMESE UNICODE SAFE BASE64 DECODER ---
        function decodeSafeUTF8(base64Str) {
            try {
                const binaryString = atob(base64Str);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                return new TextDecoder('utf-8').decode(bytes);
            } catch (e) {
                console.error("Decoding Error:", e);
                return null;
            }
        }

        // Get Parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const encodedData = urlParams.get('data');

        if (encodedData) {
            const jsonString = decodeSafeUTF8(encodedData);
            if (jsonString) {
                const webData = JSON.parse(jsonString);

                // Update HTML elements
                document.getElementById('app-title').innerText = webData.title || "စာရင်းချုပ်";
                document.getElementById('total-sell').innerText = Number(webData.total_sell).toLocaleString() + " MMK";
                document.getElementById('total-profit').innerText = Number(webData.total_profit).toLocaleString() + " MMK";

                // Generate Data Table Rows
                const tbody = document.getElementById('data-rows');
                tbody.innerHTML = ""; // Clear loader
                
                webData.items.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-slate-50/80 transition-colors";
                    
                    const qtyDisplay = item.qty !== null ? `${item.qty} ထည်` : "-";
                    
                    row.innerHTML = `
                        <td class="py-3 px-4 font-medium text-slate-800">${item.name}</td>
                        <td class="py-3 px-4 text-center text-slate-500">${qtyDisplay}</td>
                        <td class="py-3 px-4 text-right font-semibold">${Number(item.sell).toLocaleString()}</td>
                        <td class="py-3 px-4 text-right font-semibold text-emerald-600">+${Number(item.profit).toLocaleString()}</td>
                    `;
                    tbody.appendChild(row);
                });

                // Generate Chart.js Analytics
                const ctx = document.getElementById('analyticsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: webData.chart_labels,
                        datasets: [
                            {
                                label: 'ရောင်းရငွေ',
                                data: webData.chart_sell,
                                backgroundColor: 'rgba(99, 102, 241, 0.8)',
                                borderRadius: 6
                            },
                            {
                                label: 'အမြတ်',
                                data: webData.chart_profit,
                                backgroundColor: 'rgba(16, 185, 129, 0.8)',
                                borderRadius: 6
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { display: false, grid: { display: false } },
                            x: { grid: { display: false }, ticks: { font: { size: 10 } } }
                        }
                    }
                });
            }
        }
    </script>
</body>
</html>
