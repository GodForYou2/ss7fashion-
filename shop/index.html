<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>S&S7 Fashion - Perfect Touch Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&family=Pyidaungsu:wght=400;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', 'Pyidaungsu', sans-serif; 
            background: linear-gradient(180deg, #fdf2f8 0%, #f8fafc 100%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .luxury-gradient { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
        .luxury-glow { box-shadow: 0 8px 20px -5px rgba(236, 72, 153, 0.3); }
        .glass-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }

        /* Multi-Media Track Container */
        .slider-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            touch-action: none; /* Crucial for internal touch control */
        }
        .slider-track {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }
        .slide-item {
            flex: 0 0 100%;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .zoomable-target {
            max-width: 100%;
            max-height: 42vh;
            object-fit: contain;
            border-radius: 1rem;
            will-change: transform;
            transform-origin: center center;
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="p-4 min-h-screen text-slate-800 pb-24">

    <div class="flex justify-between items-center glass-blur p-4 rounded-3xl border border-pink-100/50 mb-5 sticky top-0 z-40 shadow-xs">
        <div>
            <h1 class="text-xl font-black tracking-wider bg-gradient-to-r from-pink-500 to-violet-600 bg-clip-text text-transparent">S&S7 FASHION</h1>
            <p id="user-greeting" class="text-[10px] text-pink-500 font-bold tracking-wide mt-0.5">COLLECTION 2026 ✨</p>
        </div>
        <div class="relative bg-pink-50/80 hover:bg-pink-100 p-3 rounded-2xl cursor-pointer active:scale-95 transition-all border border-pink-100" onclick="toggleCartModal()">
            <span class="text-xs font-bold text-pink-600">🛍️ ခြင်းတောင်း</span>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 luxury-gradient text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </div>

    <div id="root-menu-view" class="space-y-4">
        <div class="mb-2 px-1">
            <h2 class="text-xs font-black text-pink-500 uppercase tracking-widest">ပင်မကဏ္ဍများ (Categories)</h2>
        </div>
        <div id="root-cards-grid" class="grid grid-cols-1 gap-4">
            <p id="root-loading" class="text-center text-pink-400 font-medium my-12 text-xs animate-pulse">🌸 မီနူးများကို ဖတ်ရှုနေပါသည်...</p>
        </div>
    </div>

    <div id="sub-menu-view" class="hidden space-y-4">
        <div class="flex items-center justify-between mb-4 px-1">
            <button onclick="backToRootMenu()" class="flex items-center gap-1.5 text-xs font-bold text-pink-500 bg-white border border-pink-100 px-3 py-2 rounded-xl active:scale-95 transition-all">← ပင်မမီနူး</button>
            <h2 class="text-xs font-black text-white luxury-gradient px-3 py-2 rounded-xl tracking-wider uppercase luxury-glow">ကဏ္ဍခွဲများ</h2>
        </div>
        <div id="sub-cards-grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div id="product-view" class="hidden">
        <div class="flex items-center justify-between mb-4 px-1">
            <button onclick="backToSubMenu()" class="flex items-center gap-1.5 text-xs font-bold text-pink-500 bg-white border border-pink-100 px-3 py-2 rounded-xl active:scale-95 transition-all">← နောက်သို့</button>
            <h2 id="current-sub-title" class="text-xs font-black text-white luxury-gradient px-3 py-2 rounded-xl tracking-wider uppercase luxury-glow">---</h2>
        </div>
        <div id="shop-container" class="grid grid-cols-2 gap-3"></div>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black/85 z-50 flex items-end justify-center transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] shadow-2xl max-h-[85vh] relative border-t border-pink-50 flex flex-col overflow-hidden">
            
            <div class="absolute top-4 right-4 z-50">
                <button onclick="closeDetailModal()" class="w-8 h-8 bg-black/40 backdrop-blur-md text-white rounded-full text-lg font-bold flex items-center justify-center active:scale-90 shadow-md">&times;</button>
            </div>

            <div class="relative w-full h-[42vh] bg-slate-950 rounded-t-[2.5rem] overflow-hidden flex-shrink-0">
                <div id="touch-slider-box" class="slider-container">
                    <div id="detail-media-slider" class="slider-track">
                        </div>
                </div>
                
                <div class="absolute bottom-3 left-3 right-3 flex justify-between items-center px-3 py-1.5 bg-black/60 rounded-xl backdrop-blur-md pointer-events-none">
                    <span id="swipe-badge" class="text-white text-[9px] font-bold tracking-widest uppercase animate-pulse">↔ Swipe ဘေးရွှေ့ / 👆 ၂ချောင်းဖြင့်ချဲ့</span>
                    <span id="slide-index-counter" class="text-white text-[9px] font-mono">1/1</span>
                </div>
            </div>

            <div class="p-5 bg-white flex-1 flex flex-col justify-between overflow-y-auto max-h-[43vh] no-scrollbar">
                <div class="space-y-3">
                    <div>
                        <span class="text-[8px] font-bold uppercase tracking-widest text-pink-600 bg-pink-50 px-2 py-0.5 rounded-md border border-pink-100">Premium Fashion</span>
                        <h2 id="detail-title" class="text-sm font-black text-slate-800 tracking-tight leading-snug mt-1">Product Title</h2>
                    </div>
                    
                    <div class="border-t border-slate-100 pt-2">
                        <p id="detail-desc" class="text-[11px] text-slate-600 leading-relaxed whitespace-pre-line tracking-wide">Description...</p>
                    </div>
                </div>

                <div class="mt-4 pt-1">
                    <button id="detail-add-btn" class="w-full luxury-gradient text-white py-3 rounded-xl font-bold tracking-widest luxury-glow active:scale-98 transition-all text-xs uppercase flex items-center justify-center gap-2">
                        🛍️ ခြင်းတောင်းထဲထည့်မည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5 border-b border-pink-50 pb-3">
                <h2 class="text-xs font-black tracking-wider uppercase text-slate-800">🛍️ ရွေးချယ်ထားသော အထည်များ</h2>
                <button onclick="toggleCartModal()" class="text-slate-400 text-2xl font-bold active:scale-90">&times;</button>
            </div>
            <div id="cart-items" class="space-y-3 max-h-[48vh] overflow-y-auto pr-1 no-scrollbar"></div>
            <div class="border-t border-pink-50 mt-5 pt-4">
                <button onclick="toggleCartModal()" class="w-full luxury-gradient text-white py-3.5 rounded-2xl font-bold luxury-glow active:scale-95 transition-all text-xs uppercase tracking-widest">✨ ပစ္စည်း ထပ်ကြည့်မည်</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://myshop-1833.onrender.com"; 
        let allProducts = [], allCategories = [], cart = [];
        
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `မင်္ဂလာပါ ${tg.initDataUnsafe.user.first_name} ✨`;
        }

        async function loadShopData() {
            try {
                const catResponse = await fetch(`${API_URL}/api/categories`);
                if (catResponse.ok) allCategories = await catResponse.json();
            } catch (e) { console.log("Category Fetch Error"); }

            try {
                const prodResponse = await fetch(`${API_URL}/api/products`);
                allProducts = await prodResponse.json();
                allProducts.sort((a, b) => (b._id || '').toString().localeCompare((a._id || '').toString()));
            } catch (error) {
                document.getElementById('root-loading').innerText = "⚠️ ဆာဗာချိတ်ဆက်မှု မရရှိပါ";
                return;
            }
            document.getElementById('root-loading').classList.add('hidden');
            renderRootCategories();
        }

        function renderRootCategories() {
            const grid = document.getElementById('root-cards-grid');
            grid.innerHTML = '';
            const roots = allCategories.filter(c => !c.parent_id || c.parent_id === "null" || c.parent_id === "root");
            roots.forEach((cat, index) => {
                const catName = cat.name || cat.title || "Collection";
                grid.innerHTML += `
                    <div onclick="openSubMenu('${cat._id}', '${catName}')" class="bg-white border border-pink-100/70 rounded-2xl p-5 flex justify-between items-center cursor-pointer hover:border-pink-300 active:scale-98 transition-all shadow-2xs group">
                        <div>
                            <span class="text-[9px] font-mono text-pink-400 block tracking-widest mb-1">0${index + 1} / CATEGORY</span>
                            <h3 class="font-black text-sm text-slate-800 tracking-wider uppercase">${catName}</h3>
                        </div>
                        <span class="text-pink-300 group-hover:translate-x-1 transition-transform">→</span>
                    </div>`;
            });
        }

        function openSubMenu(rootId, rootName) {
            const grid = document.getElementById('sub-cards-grid');
            grid.innerHTML = '';
            const subMenus = allCategories.filter(c => c.parent_id === rootId);

            if(subMenus.length === 0) {
                grid.innerHTML = `<p class="text-center text-slate-400 text-xs py-8 bg-white rounded-2xl border border-pink-100">မီနူးခွဲများ မရှိသေးပါရှင်။</p>`;
            } else {
                subMenus.forEach((sub) => {
                    const subName = sub.name || sub.title || "Sub Category";
                    grid.innerHTML += `
                        <div onclick="selectSubCategory('${sub._id}', '${subName}')" class="bg-white border border-pink-100/70 rounded-2xl p-5 flex justify-between items-center cursor-pointer hover:border-pink-300 active:scale-98 transition-all shadow-2xs group">
                            <div>
                                <span class="text-[9px] font-mono text-pink-400 block tracking-widest mb-1">SUB / ${rootName.toUpperCase()}</span>
                                <h3 class="font-black text-sm text-slate-800 tracking-wider uppercase">${subName}</h3>
                            </div>
                            <span class="text-pink-300 group-hover:translate-x-1 transition-transform">→</span>
                        </div>`;
                });
            }
            document.getElementById('root-menu-view').classList.add('hidden');
            document.getElementById('sub-menu-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectSubCategory(subId, subName) {
            document.getElementById('current-sub-title').innerText = subName;
            const container = document.getElementById('shop-container');
            container.innerHTML = '';

            let filtered = allProducts.filter(p => {
                const pCatId = p.category_id || p.category;
                return pCatId && pCatId.toString().trim().toLowerCase() === subId.toString().trim().toLowerCase();
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center text-slate-400 my-8 text-xs bg-white p-6 rounded-2xl border border-pink-50">အထည်များ မရှိသေးပါရှင်။</div>`;
            } else {
                filtered.forEach(p => {
                    let imageUrl = 'https://placehold.co/400x500?text=S%26S7+Fashion';
                    let isVideo = false;

                    if (p.colors?.[0]?.media?.[0]?.file_id) {
                        imageUrl = `${API_URL}/api/image/${p.colors[0].media[0].file_id}`;
                        isVideo = p.colors[0].media[0].type === 'video';
                    } else if (p.file_id) {
                        imageUrl = `${API_URL}/api/image/${p.file_id}`;
                        isVideo = p.type === 'video';
                    }

                    const mediaTag = isVideo 
                        ? `<div class="relative w-full h-44 overflow-hidden bg-slate-900 flex items-center justify-center"><video src="${imageUrl}" muted loop autoplay playsinline class="w-full h-full object-cover pointer-events-none"></video></div>`
                        : `<img src="${imageUrl}" class="w-full h-44 object-cover bg-slate-50">`;

                    container.innerHTML += `
                        <div onclick="openDetailModal('${p._id}')" class="bg-white border border-pink-50/60 rounded-2xl overflow-hidden flex flex-col justify-between cursor-pointer p-2 shadow-2xs">
                            <div class="overflow-hidden rounded-xl relative">${mediaTag}</div>
                            <div class="pt-2 px-1 pb-1">
                                <h3 class="font-bold text-[11px] text-slate-800 line-clamp-1">${p.name || 'Untitled'}</h3>
                                <p class="text-[9px] text-pink-500 font-bold mt-0.5 tracking-wider uppercase">ကြည့်ရှုရန်</p>
                            </div>
                        </div>`;
                });
            }
            document.getElementById('sub-menu-view').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToRootMenu() {
            document.getElementById('sub-menu-view').classList.add('hidden');
            document.getElementById('root-menu-view').classList.remove('hidden');
        }
        function backToSubMenu() {
            document.getElementById('product-view').classList.add('hidden');
            document.getElementById('sub-menu-view').classList.remove('hidden');
        }

        // 🌟 HIGH-PERFORMANCE CUSTOM SWIPE & ZOOM INFRASTRUCTURE
        let currentSlideIndex = 0;
        let totalSlidesCount = 0;

        function openDetailModal(productId) {
            const product = allProducts.find(p => p._id === productId);
            if (!product) return;

            document.getElementById('detail-title').innerText = product.name || 'Untitled';
            document.getElementById('detail-desc').innerText = product.description || 'အညွှန်း မရှိပါ။';
            document.getElementById('detail-add-btn').setAttribute('onclick', `addToCart('${product._id}', '${product.name || "Premium Item"}')`);

            const sliderTrack = document.getElementById('detail-media-slider');
            sliderTrack.innerHTML = '';
            currentSlideIndex = 0;
            sliderTrack.style.transform = `translateX(0px)`;

            let mediaList = [];
            if (product.colors && Array.isArray(product.colors)) {
                product.colors.forEach(c => {
                    if (c.media && Array.isArray(c.media)) {
                        c.media.forEach(m => { if (m.file_id) mediaList.push(m); });
                    }
                });
            }
            if (mediaList.length === 0 && product.file_id) {
                mediaList.push({ file_id: product.file_id, type: product.type || 'image' });
            }

            totalSlidesCount = mediaList.length;
            document.getElementById('slide-index-counter').innerText = `1/${totalSlidesCount}`;

            if (mediaList.length > 0) {
                mediaList.forEach((m) => {
                    const mediaUrl = `${API_URL}/api/image/${m.file_id}`;
                    let slideHtml = `<div class="slide-item">`;
                    if (m.type === 'video') {
                        slideHtml += `<video src="${mediaUrl}" loop autoplay muted playsinline controls class="zoomable-target bg-black"></video>`;
                    } else {
                        slideHtml += `<img src="${mediaUrl}" class="zoomable-target" alt="fashion-item">`;
                    }
                    slideHtml += `</div>`;
                    sliderTrack.innerHTML += slideHtml;
                });
                document.getElementById('swipe-badge').classList.toggle('hidden', totalSlidesCount <= 1);
                initMasterTouchLogic();
            } else {
                sliderTrack.innerHTML = `<div class="slide-item text-slate-400 text-xs bg-slate-900">No Image</div>`;
                document.getElementById('swipe-badge').classList.add('hidden');
            }

            document.getElementById('detail-modal').classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function initMasterTouchLogic() {
            const container = document.getElementById('touch-slider-box');
            const track = document.getElementById('detail-media-slider');
            
            let startX = 0, startY = 0, currentX = 0;
            let isSwiping = false, isZooming = false;
            
            let scale = 1, startDist = 0, initialScale = 1;
            let panX = 0, panY = 0, startPanX = 0, startPanY = 0;

            container.addEventListener('touchstart', (e) => {
                const activeMedia = track.children[currentSlideIndex].querySelector('.zoomable-target');

                if (e.touches.length === 2) {
                    // Two fingers detected: Lock swipe, activate zoom mode
                    isZooming = true;
                    isSwiping = false;
                    startDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    initialScale = scale;
                } else if (e.touches.length === 1) {
                    if (scale > 1) {
                        // Drag/Pan inside zoomed asset
                        isZooming = true;
                        isSwiping = false;
                        startPanX = e.touches[0].clientX - panX;
                        startPanY = e.touches[0].clientY - panY;
                    } else {
                        // Standard Single Swipe Gesture
                        isSwiping = true;
                        isZooming = false;
                        startX = e.touches[0].clientX;
                        startY = e.touches[0].clientY;
                        track.style.transition = 'none'; // Unbind animation for drag response
                    }
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                const activeMedia = track.children[currentSlideIndex].querySelector('.zoomable-target');

                if (isZooming && e.touches.length === 2) {
                    e.preventDefault();
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    scale = (currentDist / startDist) * initialScale;
                    if (scale < 1) scale = 1;
                    if (scale > 4) scale = 4;
                    
                    if (scale === 1) { panX = 0; panY = 0; }
                    activeMedia.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                } 
                else if (isZooming && e.touches.length === 1 && scale > 1) {
                    e.preventDefault();
                    panX = e.touches[0].clientX - startPanX;
                    panY = e.touches[0].clientY - startPanY;
                    
                    // Constrain bounds inside view
                    const limit = (scale - 1) * 80;
                    if (panX > limit) panX = limit; if (panX < -limit) panX = -limit;
                    if (panY > limit) panY = limit; if (panY < -limit) panY = -limit;
                    
                    activeMedia.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                } 
                else if (isSwiping && e.touches.length === 1 && scale === 1) {
                    currentX = e.touches[0].clientX;
                    let diffX = currentX - startX;
                    let diffY = e.touches[0].clientY - startY;

                    // Confirm horizontal swipe intent rather than vertical layout scroll
                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        e.preventDefault();
                        let baseTranslate = -currentSlideIndex * container.offsetWidth;
                        track.style.transform = `translateX(${baseTranslate + diffX}px)`;
                    }
                }
            }, { passive: false });

            container.addEventListener('touchend', (e) => {
                const activeMedia = track.children[currentSlideIndex].querySelector('.zoomable-target');

                if (isSwiping && scale === 1) {
                    isSwiping = false;
                    let diffX = currentX - startX;
                    let threshold = container.offsetWidth * 0.22; // 22% drag completes slide change

                    track.style.transition = 'transform 0.25s ease-out';
                    if (diffX < -threshold && currentSlideIndex < totalSlidesCount - 1) {
                        currentSlideIndex++;
                    } else if (diffX > threshold && currentSlideIndex > 0) {
                        currentSlideIndex--;
                    }
                    track.style.transform = `translateX(${-currentSlideIndex * container.offsetWidth}px)`;
                    document.getElementById('slide-index-counter').innerText = `${currentSlideIndex + 1}/${totalSlidesCount}`;
                }

                if (e.touches.length === 0) {
                    isZooming = false;
                    // Auto restore layout context if scale is close to minimal baseline
                    if (scale <= 1.08) {
                        scale = 1; panX = 0; panY = 0;
                        if(activeMedia) activeMedia.style.transform = `translate(0px, 0px) scale(1)`;
                    }
                }
            });
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media-slider').innerHTML = '';
        }

        function addToCart(id, name) {
            let item = cart.find(x => x.id === id);
            if (item) { item.qty++; } else { cart.push({ id, name, qty: 1 }); }
            updateCartUI();
            closeDetailModal();
            toggleCartModal();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-center text-xs text-slate-400 py-12">ခြင်းတောင်းထဲမှာ အထည်မရှိသေးပါရှင် 💖</p>`;
                return;
            }

            cart.forEach(item => {
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-pink-50/40 p-4 rounded-2xl border border-pink-100/40">
                        <p class="font-bold text-xs text-slate-700">✨ ${item.name}</p>
                        <span class="luxury-gradient text-white px-3 py-1 rounded-xl text-[10px] font-black">QTY: ${item.qty}</span>
                    </div>`;
            });
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        loadShopData();
    </script>
</body>
</html>
