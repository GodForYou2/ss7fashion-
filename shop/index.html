<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>S&S7 Fashion - Premium Luxury Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;500;600;700;800&family=Pyidaungsu:wght=400;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', 'Pyidaungsu', sans-serif; 
            background: linear-gradient(180deg, #fff1f2 0%, #fcf8fa 100%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .luxury-gradient { background: linear-gradient(135deg, #f43f5e 0%, #ec4899 50%, #d946ef 100%); }
        .luxury-glow { box-shadow: 0 8px 25px -5px rgba(236, 72, 153, 0.35); }
        .glass-blur { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); }

        /* ✨ Luxury Card Styles with Animations */
        .luxury-card {
            background: #ffffff;
            border: 1px solid rgba(244, 63, 94, 0.08);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @media (hover: hover) {
            .luxury-card:hover {
                transform: translateY(-5px) scale(1.015);
                border-color: #f43f5e;
                box-shadow: 0 15px 30px -10px rgba(244, 63, 94, 0.25);
            }
            .luxury-card:hover .arrow-icon {
                transform: translateX(5px);
                color: #f43f5e;
            }
            .luxury-card::after {
                content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
                background: linear-gradient(to right, transparent, rgba(255, 192, 203, 0.4), transparent);
                transform: skewX(-25deg); transition: 0.75s;
            }
            .luxury-card:hover::after { left: 150%; }
        }
        .luxury-card:active {
            transform: scale(0.97); background-color: #fff1f2; border-color: #ec4899;
        }

        /* 🖼️ Slider Styles */
        .slider-container { position: relative; width: 100%; height: 100%; overflow: hidden; touch-action: none; }
        .slider-track { display: flex; width: 100%; height: 100%; will-change: transform; transition: transform 0.28s cubic-bezier(0.16, 1, 0.3, 1); }
        .slide-item { flex: 0 0 100%; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .zoomable-target { max-width: 100%; max-height: 42vh; object-fit: contain; border-radius: 1.5rem; will-change: transform; transform-origin: center center; transition: transform 0.1s ease-out; }
    </style>
</head>
<body class="p-4 min-h-screen text-slate-800 pb-24">

    <div class="flex justify-between items-center glass-blur p-4 rounded-3xl border border-rose-100/60 mb-5 sticky top-0 z-40 shadow-xs">
        <div>
            <h1 class="text-xl font-black tracking-wider bg-gradient-to-r from-rose-500 via-pink-500 to-fuchsia-600 bg-clip-text text-transparent">S&S7 FASHION</h1>
            <p id="user-greeting" class="text-[10px] text-rose-500 font-bold tracking-wide mt-0.5">PREMIUM LUXURY HUB ✨</p>
        </div>
        <div class="relative bg-rose-50/80 hover:bg-rose-100 p-3 rounded-2xl cursor-pointer active:scale-95 transition-all border border-rose-100" onclick="toggleCartModal()">
            <span class="text-xs font-bold text-rose-600">🛍️ ခြင်းတောင်း</span>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 luxury-gradient text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </div>

    <div id="root-menu-view" class="space-y-4">
        <div class="mb-2 px-1">
            <h2 class="text-xs font-black text-rose-500 uppercase tracking-widest flex items-center gap-1">🌸 ပင်မကဏ္ဍများ <span class="text-[10px] animate-pulse">✨</span></h2>
        </div>
        <div id="root-cards-grid" class="grid grid-cols-1 gap-4">
            <p id="root-loading" class="text-center text-rose-400 font-medium my-12 text-xs animate-pulse">🌸 မီနူးများကို ဖတ်ရှုနေပါသည်...</p>
        </div>
    </div>

    <div id="sub-menu-view" class="hidden space-y-4">
        <div class="flex items-center justify-between mb-4 px-1">
            <button onclick="backToRootMenu()" class="flex items-center gap-1.5 text-xs font-bold text-rose-500 bg-white border border-rose-100 px-3 py-2 rounded-xl active:scale-95 transition-all">← ပင်မမီနူး</button>
            <h2 class="text-xs font-black text-white luxury-gradient px-3 py-2 rounded-xl tracking-wider uppercase luxury-glow">ကဏ္ဍခွဲများ</h2>
        </div>
        <div id="sub-cards-grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div id="product-view" class="hidden">
        <div class="flex items-center justify-between mb-4 px-1">
            <button onclick="backToSubMenu()" class="flex items-center gap-1.5 text-xs font-bold text-rose-500 bg-white border border-rose-100 px-3 py-2 rounded-xl active:scale-95 transition-all">← နောက်သို့</button>
            <h2 id="current-sub-title" class="text-xs font-black text-white luxury-gradient px-3 py-2 rounded-xl tracking-wider uppercase luxury-glow">---</h2>
        </div>
        <div id="shop-container" class="grid grid-cols-2 gap-3"></div>
        
        <div id="lazy-loading-trigger" class="text-center text-rose-400 text-xs py-5 hidden font-medium animate-pulse">
            🌸 ပစ္စည်းအသစ်များ ထပ်မံဆွဲတင်နေပါသည်...
        </div>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black/85 z-50 flex items-end justify-center transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] shadow-2xl max-h-[85vh] relative border-t border-rose-50 flex flex-col overflow-hidden">
            <div class="absolute top-4 right-4 z-50">
                <button onclick="closeDetailModal()" class="w-8 h-8 bg-black/40 backdrop-blur-md text-white rounded-full text-lg font-bold flex items-center justify-center active:scale-90 shadow-md">&times;</button>
            </div>
            <div class="relative w-full h-[42vh] bg-slate-950 rounded-t-[2.5rem] overflow-hidden flex-shrink-0">
                <div id="touch-slider-box" class="slider-container">
                    <div id="detail-media-slider" class="slider-track"></div>
                </div>
                <!-- ယခင် Box ပုံစံမှ Transparent + Drop Shadow ပုံစံသို့ ပြောင်းလဲထားခြင်း -->
                <div class="absolute top-4 left-4 right-4 flex justify-between items-center pointer-events-none drop-shadow-[0_2px_4px_rgba(0,0,0,0.6)]">
                     <span id="swipe-badge" class="text-white text-[10px] font-bold tracking-widest uppercase">↔ ပွတ်ဆွဲကြည့်ရန်</span>
                     <span id="slide-index-counter" class="text-white text-[10px] font-mono font-bold">1/1</span>
                </div>
            </div>
            <div class="p-5 bg-white flex-1 flex flex-col justify-between overflow-y-auto max-h-[43vh] no-scrollbar">
                <div class="space-y-3">
                    <div>
                        <span class="text-[8px] font-bold uppercase tracking-widest text-rose-600 bg-rose-50 px-2 py-0.5 rounded-md border border-rose-100">Premium Collection</span>
                        <h2 id="detail-title" class="text-sm font-black text-slate-800 tracking-tight leading-snug mt-1">Product Title</h2>
                    </div>
                    <div class="border-t border-slate-100 pt-2">
                        <p id="detail-desc" class="text-[11px] text-slate-600 leading-relaxed whitespace-pre-line tracking-wide">Description...</p>
                    </div>
                </div>
                <div class="mt-4 pt-1">
                    <button id="detail-add-btn" class="w-full luxury-gradient text-white py-3 rounded-xl font-bold tracking-widest luxury-glow active:scale-98 transition-all text-xs uppercase flex items-center justify-center gap-2">
                        🛍️ ခြင်းတောင်းထဲထည့်မည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl max-h-[80vh] flex flex-col justify-between">
            <div class="flex justify-between items-center mb-5 border-b border-rose-50 pb-3 flex-shrink-0">
                <h2 class="text-xs font-black tracking-wider uppercase text-slate-800">🛍️ ရွေးချယ်ထားသော အထည်များ</h2>
                <button onclick="toggleCartModal()" class="text-slate-400 text-2xl font-bold active:scale-90">&times;</button>
            </div>
            <div id="cart-items" class="space-y-3 overflow-y-auto pr-1 no-scrollbar flex-1 max-h-[48vh]"></div>
            <div class="border-t border-rose-50 mt-5 pt-4 flex-shrink-0">
                <button onclick="toggleCartModal()" class="w-full luxury-gradient text-white py-3.5 rounded-2xl font-bold luxury-glow active:scale-95 transition-all text-xs uppercase tracking-widest">
                    ✨ ပစ္စည်း ထပ်ကြည့်မည်
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://myshop-1833.onrender.com"; 
        let allProducts = [], allCategories = [], cart = [];
        
        let filteredProducts = [];
        let itemsToShow = 20;
        let currentLoadedCount = 0;
        let isViewActive = false;

        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `မင်္ဂလာပါ ${tg.initDataUnsafe.user.first_name} ✨`;
        }

        // 📥 Load Data from Backend
        async function loadShopData() {
            try {
                const catResponse = await fetch(`${API_URL}/api/categories`);
                if (catResponse.ok) allCategories = await catResponse.json();
            } catch (e) { console.log("Category Fetch Error"); }

            try {
                const prodResponse = await fetch(`${API_URL}/api/products`);
                allProducts = await prodResponse.json();
                allProducts.sort((a, b) => (b._id || '').toString().localeCompare((a._id || '').toString()));
            } catch (error) {
                document.getElementById('root-loading').innerText = "⚠️ ဆာဗာချိတ်ဆက်မှု မရရှိပါ";
                return;
            }
            document.getElementById('root-loading').classList.add('hidden');
            renderRootCategories();
        }

        // 🏷️ Render Root Categories
        function renderRootCategories() {
            const grid = document.getElementById('root-cards-grid');
            grid.innerHTML = '';
            const roots = allCategories.filter(c => !c.parent_id || c.parent_id === "null" || c.parent_id === "root");
            roots.forEach((cat, index) => {
                const catName = cat.name || cat.title || "Collection";
                grid.innerHTML += `
                    <div onclick="openSubMenu('${cat._id}', '${catName}')" class="luxury-card rounded-2xl p-5 flex justify-between items-center cursor-pointer shadow-2xs group">
                        <div class="z-10">
                            <span class="text-[9px] font-mono text-rose-400 block tracking-widest mb-1">0${index + 1} / ROMANTIC EXCLUSIVE</span>
                            <h3 class="font-bold text-sm text-slate-800 tracking-wider uppercase group-hover:text-rose-600 transition-colors">${catName}</h3>
                        </div>
                        <span class="arrow-icon text-rose-300 font-bold transition-transform duration-300 z-10">→</span>
                    </div>`;
            });
        }

        // 🏷️ Open Sub Categories View
        function openSubMenu(rootId, rootName) {
            const grid = document.getElementById('sub-cards-grid');
            grid.innerHTML = '';
            const subMenus = allCategories.filter(c => c.parent_id === rootId);

            if(subMenus.length === 0) {
                grid.innerHTML = `<p class="text-center text-slate-400 text-xs py-8 bg-white rounded-2xl border border-rose-100">မီနူးခွဲများ မရှိသေးပါရှင်။</p>`;
            } else {
                subMenus.forEach((sub) => {
                    const subName = sub.name || sub.title || "Sub Category";
                    grid.innerHTML += `
                        <div onclick="selectSubCategory('${sub._id}', '${subName}')" class="luxury-card rounded-2xl p-5 flex justify-between items-center cursor-pointer shadow-2xs group">
                            <div class="z-10">
                                <span class="text-[9px] font-mono text-rose-400 block tracking-widest mb-1">SUB / ${rootName.toUpperCase()}</span>
                                <h3 class="font-bold text-sm text-slate-800 tracking-wider uppercase group-hover:text-rose-600 transition-colors">${subName}</h3>
                            </div>
                            <span class="arrow-icon text-rose-300 font-bold transition-transform duration-300 z-10">→</span>
                        </div>`;
                });
            }
            document.getElementById('root-menu-view').classList.add('hidden');
            document.getElementById('sub-menu-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 👗 Select SubCategory & Prepare Lazy Loading
        function selectSubCategory(subId, subName) {
            document.getElementById('current-sub-title').innerText = subName;
            const container = document.getElementById('shop-container');
            container.innerHTML = '';

            filteredProducts = allProducts.filter(p => {
                const pCatId = p.category_id || p.category;
                return pCatId && pCatId.toString().trim().toLowerCase() === subId.toString().trim().toLowerCase();
            });

            currentLoadedCount = 0; 
            isViewActive = true;

            if (filteredProducts.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center text-slate-400 my-8 text-xs bg-white p-6 rounded-2xl border border-rose-50">အထည်များ မရှိသေးပါရှင်။</div>`;
            } else {
                appendNextBatch();
            }

            document.getElementById('sub-menu-view').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 🚀 Lazy Loading Engine (Append Batch Products)
        function appendNextBatch() {
            if (!isViewActive) return;
            const container = document.getElementById('shop-container');
            const nextBatch = filteredProducts.slice(currentLoadedCount, currentLoadedCount + itemsToShow);
            
            if (nextBatch.length === 0) return;

            nextBatch.forEach(p => {
                let imageUrl = 'https://placehold.co/400x500?text=S%26S7+Fashion';
                let isVideo = false;

                if (p.colors?.[0]?.media?.[0]?.file_id) {
                    imageUrl = `${API_URL}/api/image/${p.colors[0].media[0].file_id}`;
                    isVideo = p.colors[0].media[0].type === 'video';
                } else if (p.file_id) {
                    imageUrl = `${API_URL}/api/image/${p.file_id}`;
                    isVideo = p.type === 'video';
                }

                const mediaTag = isVideo 
                    ? `<div class="relative w-full h-44 overflow-hidden bg-slate-900 flex items-center justify-center"><video src="${imageUrl}" muted loop autoplay playsinline class="w-full h-full object-cover pointer-events-none"></video></div>`
                    : `<img src="${imageUrl}" class="w-full h-44 object-cover bg-slate-50" loading="lazy">`;

                container.innerHTML += `
                    <div onclick="openDetailModal('${p._id}')" class="bg-white border border-rose-50/60 rounded-2xl overflow-hidden flex flex-col justify-between cursor-pointer p-2 shadow-2xs hover:shadow-md hover:border-rose-200 transition-all active:scale-98">
                        <div class="overflow-hidden rounded-xl relative">${mediaTag}</div>
                        <div class="pt-2 px-1 pb-1">
                            <h3 class="font-bold text-[11px] text-slate-800 line-clamp-1">${p.name || 'Untitled'}</h3>
                            <p class="text-[9px] text-rose-500 font-bold mt-0.5 tracking-wider uppercase">ကြည့်ရှုရန် ✨</p>
                        </div>
                    </div>`;
            });

            currentLoadedCount += nextBatch.length;
            toggleLoadingIndicator();
        }

        function toggleLoadingIndicator() {
            const indicator = document.getElementById('lazy-loading-trigger');
            if (currentLoadedCount < filteredProducts.length) {
                indicator.classList.remove('hidden');
            } else {
                indicator.classList.add('hidden');
            }
        }

        // Scroll Event Listener for Infinite Scroll
        window.addEventListener('scroll', () => {
            if (!isViewActive) return;
            if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 120) {
                if (currentLoadedCount < filteredProducts.length) {
                    appendNextBatch();
                }
            }
        });

        // Navigation Controllers
        function backToRootMenu() {
            isViewActive = false;
            document.getElementById('sub-menu-view').classList.add('hidden');
            document.getElementById('root-menu-view').classList.remove('hidden');
        }
        function backToSubMenu() {
            isViewActive = false;
            document.getElementById('product-view').classList.add('hidden');
            document.getElementById('sub-menu-view').classList.remove('hidden');
        }

        let currentSlideIndex = 0;
        let totalSlidesCount = 0;

        // 🔍 Open Detail Modal & Sync file_id
        function openDetailModal(productId) {
            const product = allProducts.find(p => p._id === productId);
            if (!product) return;

            document.getElementById('detail-title').innerText = product.name || 'Untitled';
            document.getElementById('detail-desc').innerText = product.description || 'အညွှန်း မရှိပါ။';
            
            // 💡 Extract Active file_id for Hyperlink System
            const activeFileId = product.colors?.[0]?.media?.[0]?.file_id || product.file_id || "";
            document.getElementById('detail-add-btn').setAttribute('onclick', `addToCart('${product._id}', '${product.name || "Premium Item"}', '${activeFileId}')`);

            const sliderTrack = document.getElementById('detail-media-slider');
            sliderTrack.innerHTML = '';
            currentSlideIndex = 0;
            sliderTrack.style.transform = `translateX(0px)`;

            let mediaList = [];
            if (product.colors && Array.isArray(product.colors)) {
                product.colors.forEach(c => {
                    if (c.media && Array.isArray(c.media)) {
                        c.media.forEach(m => { if (m.file_id) mediaList.push(m); });
                    }
                });
            }
            if (mediaList.length === 0 && product.file_id) {
                mediaList.push({ file_id: product.file_id, type: product.type || 'image' });
            }

            totalSlidesCount = mediaList.length;
            document.getElementById('slide-index-counter').innerText = `1/${totalSlidesCount}`;

            if (mediaList.length > 0) {
                mediaList.forEach((m) => {
                    const mediaUrl = `${API_URL}/api/image/${m.file_id}`;
                    let slideHtml = `<div class="slide-item">`;
                    if (m.type === 'video') {
                        slideHtml += `<video src="${mediaUrl}" loop autoplay muted playsinline controls class="zoomable-target bg-black"></video>`;
                    } else {
                        slideHtml += `<img src="${mediaUrl}" class="zoomable-target" alt="fashion-item">`;
                    }
                    slideHtml += `</div>`;
                    sliderTrack.innerHTML += slideHtml;
                });
                document.getElementById('swipe-badge').classList.toggle('hidden', totalSlidesCount <= 1);
                initPrecisionTouchEngine();
            } else {
                sliderTrack.innerHTML = `<div class="slide-item text-slate-400 text-xs bg-slate-900">No Image</div>`;
                document.getElementById('swipe-badge').classList.add('hidden');
            }

            document.getElementById('detail-modal').classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // 🛍️ Add to Cart Action with file_id Injection
        function addToCart(id, name, fileId) {
            let item = cart.find(x => x.id === id);
            if (item) { 
                item.qty++; 
            } else { 
                cart.push({ 
                    id, 
                    name, 
                    qty: 1, 
                    file_id: fileId || null 
                }); 
            }
            updateCartUI(); 
            closeDetailModal(); 
            toggleCartModal();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        // 🗑️ Remove Item from Cart Function (New Feature)
        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // 🛒 Render Cart UI dynamically
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-center text-xs text-slate-400 py-12">ခြင်းတောင်းထဲမှာ အထည်မရှိသေးပါရှင် 💖</p>`;
                return;
            }
            
            cart.forEach(item => {
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-rose-50/40 p-4 rounded-2xl border border-rose-100/40">
                        <div>
                            <p class="font-bold text-xs text-slate-700">✨ ${item.name}</p>
                            <span class="text-[10px] text-slate-400">အရေအတွက်: ${item.qty} ထည်</span>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" class="text-rose-500 bg-rose-50 hover:bg-rose-100 p-2 rounded-xl text-xs active:scale-90 transition-all border border-rose-100">
                            🗑️ ဖျက်မယ်
                        </button>
                    </div>`;
            });
            
            // ✅ Emerald Gradient "Confirm Order" Button injected inside Cart Container
            cartItemsContainer.innerHTML += `
                <button onclick="sendOrderToBot()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white py-3.5 rounded-2xl font-bold active:scale-95 transition-all text-xs uppercase tracking-widest mt-4 shadow-md shadow-emerald-200">
                    ✅ အော်ဒါတင်မည် (Confirm Order)
                </button>
            `;
        }

        // 🚀 Send Data Back to Telegram Bot
        function sendOrderToBot() {
            if (cart.length === 0) return;
            const orderData = {
                action: "NEW_ORDER",
                items: cart
            };
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // 🎛️ Touch Gesture Engine (Swipe & Zoom Controls)
        function initPrecisionTouchEngine() {
            const container = document.getElementById('touch-slider-box');
            const track = document.getElementById('detail-media-slider');
            let startX = 0, startY = 0, currentX = 0;
            let isSwiping = false, isZooming = false;
            let scale = 1, startDist = 0, initialScale = 1;
            let panX = 0, panY = 0, startPanX = 0, startPanY = 0;

            container.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    isZooming = true; isSwiping = false;
                    startDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    initialScale = scale;
                } else if (e.touches.length === 1) {
                    if (scale > 1) {
                        isZooming = true; isSwiping = false;
                        startPanX = e.touches[0].clientX - panX; startPanY = e.touches[0].clientY - panY;
                    } else {
                        isSwiping = true; isZooming = false;
                        startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                        currentX = startX; track.style.transition = 'none'; 
                    }
                }
            }, { passive: false });

            container.addEventListener('touchmove', (e) => {
                const activeMedia = track.children[currentSlideIndex].querySelector('.zoomable-target');
                if (isZooming && e.touches.length === 2) {
                    e.preventDefault();
                    const currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    scale = (currentDist / startDist) * initialScale;
                    if (scale < 1) scale = 1; if (scale > 4) scale = 4;
                    if (scale === 1) { panX = 0; panY = 0; }
                    if (activeMedia) activeMedia.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                } 
                else if (isZooming && e.touches.length === 1 && scale > 1) {
                    e.preventDefault();
                    panX = e.touches[0].clientX - startPanX; panY = e.touches[0].clientY - startPanY;
                    const limit = (scale - 1) * 80;
                    if (panX > limit) panX = limit; if (panX < -limit) panX = -limit;
                    if (panY > limit) panY = limit; if (panY < -limit) panY = -limit;
                    if (activeMedia) activeMedia.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
                } 
                else if (isSwiping && e.touches.length === 1 && scale === 1) {
                    currentX = e.touches[0].clientX;
                    let diffX = currentX - startX; let diffY = e.touches[0].clientY - startY;
                    if (Math.abs(diffX) > Math.abs(diffY)) {
                        e.preventDefault();
                        let baseTranslate = -currentSlideIndex * container.offsetWidth;
                        track.style.transform = `translateX(${baseTranslate + diffX}px)`;
                    }
                }
            }, { passive: false });

            container.addEventListener('touchend', (e) => {
                const activeMedia = track.children[currentSlideIndex].querySelector('.zoomable-target');
                if (isSwiping && scale === 1) {
                    isSwiping = false;
                    let diffX = currentX - startX; let minSwipeThreshold = 45; 
                    track.style.transition = 'transform 0.28s cubic-bezier(0.16, 1, 0.3, 1)';
                    if (diffX < -minSwipeThreshold && currentSlideIndex < totalSlidesCount - 1) { currentSlideIndex++; } 
                    else if (diffX > minSwipeThreshold && currentSlideIndex > 0) { currentSlideIndex--; }
                    track.style.transform = `translateX(${-currentSlideIndex * container.offsetWidth}px)`;
                    document.getElementById('slide-index-counter').innerText = `${currentSlideIndex + 1}/${totalSlidesCount}`;
                }
                if (e.touches.length === 0) {
                    isZooming = false;
                    if (scale <= 1.08) {
                        scale = 1; panX = 0; panY = 0;
                        if(activeMedia) activeMedia.style.transform = `translate(0px, 0px) scale(1)`;
                    }
                }
            });
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media-slider').innerHTML = '';
        }

        function toggleCartModal() { document.getElementById('cart-modal').classList.toggle('hidden'); }

        // Start Application Engine
        loadShopData();
    </script>
</body>
