<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S7 Fashion - Visual Showroom</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Pyidaungsu:wght@400;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', 'Pyidaungsu', sans-serif; 
            background: linear-gradient(180deg, #fdf2f8 0%, #f8fafc 100%);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .luxury-gradient { background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%); }
        .luxury-glow { box-shadow: 0 10px 25px -5px rgba(236, 72, 153, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); }
    </style>
</head>
<body class="p-4 min-h-screen text-slate-800 pb-24">

    <div class="flex justify-between items-center glass-header p-4 rounded-3xl border border-pink-100/50 mb-5 shadow-xs">
        <div>
            <h1 class="text-2xl font-black tracking-tight bg-gradient-to-r from-pink-500 to-violet-600 bg-clip-text text-transparent">
                S&S7 Fashion
            </h1>
            <p id="user-greeting" class="text-xs text-pink-500 font-bold mt-0.5">မင်္ဂလာပါ သခင်လေး 🙏</p>
        </div>
        <div class="relative bg-pink-50/80 hover:bg-pink-100 p-3.5 rounded-2xl cursor-pointer transition-all active:scale-90" onclick="toggleCartModal()">
            <span class="text-xl">🛍️</span>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 luxury-gradient text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold border-2 border-white shadow-xs">0</span>
        </div>
    </div>

    <div id="main-category-menu" class="flex gap-2 overflow-x-auto no-scrollbar pb-3">
        <button onclick="filterMainCategory('all')" id="cat-all" class="luxury-gradient text-white px-5 py-2.5 rounded-2xl text-xs font-semibold whitespace-nowrap luxury-glow">
            ✨ အားလုံးကြည့်မည်
        </button>
    </div>

    <div id="shop-container" class="grid grid-cols-2 gap-4">
        <p id="loading-text" class="col-span-2 text-center text-pink-400 font-medium my-16 text-sm animate-pulse">
            🌸 ဖက်ရှင်များကို ဆွဲယူနေပါသည်...
        </p>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] shadow-2xl max-h-[88vh] overflow-y-auto relative border-t border-pink-50">
            
            <div class="absolute top-4 right-4 z-50">
                <button onclick="closeDetailModal()" class="w-9 h-9 bg-black/40 backdrop-blur-md text-white rounded-full text-xl font-bold flex items-center justify-center active:scale-90">&times;</button>
            </div>

            <div class="relative w-full h-[40vh] bg-slate-900">
                <div id="detail-media-slider" class="w-full h-full flex overflow-x-auto snap-x snap-mandatory no-scrollbar">
                    </div>
                <div id="swipe-badge" class="absolute bottom-3 right-4 bg-black/50 text-white text-[10px] px-2.5 py-1 rounded-full font-medium tracking-wide hidden">
                    👈 Swipe ဘယ်ညာဆွဲကြည့်ရန်
                </div>
            </div>

            <div class="p-6 bg-white rounded-t-[2.5rem] -mt-6 relative z-10">
                <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-4"></div>
                
                <div class="flex justify-between items-start gap-2">
                    <h2 id="detail-title" class="text-lg font-black text-slate-800 leading-snug">Product Name</h2>
                    <span class="inline-block bg-pink-50 text-pink-600 font-bold text-[10px] tracking-wider px-2.5 py-1 rounded-lg">Premium ✨</span>
                </div>
                
                <div class="mt-4">
                    <h4 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">အသေးစိတ်အချက်အလက် (Description)</h4>
                    <p id="detail-desc" class="text-xs text-slate-600 mt-2 leading-relaxed whitespace-pre-line bg-pink-50/20 p-4 rounded-2xl border border-pink-100/30">
                        Description...
                    </p>
                </div>

                <div class="mt-5">
                    <button id="detail-add-btn" class="w-full luxury-gradient text-white py-3.5 rounded-2xl font-bold shadow-lg luxury-glow active:scale-95 transition-all text-xs tracking-wider">
                        💖 ခြင်းတောင်းထဲထည့်မည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b border-pink-50 pb-3">
                <h2 class="text-base font-bold text-slate-800 flex items-center gap-2">🛍️ သင်ရွေးချယ်ထားသော အထည်များ</h2>
                <button onclick="toggleCartModal()" class="text-slate-400 text-2xl font-bold active:scale-90">&times;</button>
            </div>
            
            <div id="cart-items" class="space-y-3 max-h-[50vh] overflow-y-auto pr-1 no-scrollbar"></div>
            
            <div class="border-t border-pink-50 mt-5 pt-4">
                <button onclick="toggleCartModal()" class="w-full luxury-gradient text-white py-3.5 rounded-2xl font-bold shadow-lg luxury-glow active:scale-95 transition-all text-xs">
                    ✨ ပစ္စည်း ဆက်လက်ကြည့်ရှုမည်
                </button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://myshop-1833.onrender.com"; 
        
        let allProducts = [];
        let mainCategories = [];
        let selectedMainCat = 'all';
        let cart = [];
        
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `မင်္ဂလာပါ ${tg.initDataUnsafe.user.first_name} ✨`;
        }

        async function loadShopData() {
            try {
                const catResponse = await fetch(`${API_URL}/api/categories`);
                if (catResponse.ok) mainCategories = await catResponse.json();
            } catch (e) { console.log("Category Fetch Error"); }

            try {
                const prodResponse = await fetch(`${API_URL}/api/products`);
                allProducts = await prodResponse.json();
                allProducts.sort((a, b) => (b._id || '').toString().localeCompare((a._id || '').toString()));
            } catch (error) {
                document.getElementById('loading-text').innerText = "⚠️ API သို့မဟုတ် ဆာဗာလင့်ခ်ကို စစ်ဆေးပေးပါ";
                return;
            }

            document.getElementById('loading-text').classList.add('hidden');
            renderMainCategories();
            renderProducts();
        }

        function renderMainCategories() {
            const menuContainer = document.getElementById('main-category-menu');
            menuContainer.innerHTML = `<button onclick="filterMainCategory('all')" id="cat-all" class="luxury-gradient text-white px-5 py-2.5 rounded-2xl text-xs font-semibold whitespace-nowrap luxury-glow">✨ အားလုံးကြည့်မည်</button>`;
            
            if(mainCategories.length > 0) {
                mainCategories.forEach(cat => {
                    const catName = cat.name || cat.title || "ကဏ္ဍ";
                    menuContainer.innerHTML += `
                        <button onclick="filterMainCategory('${cat._id}')" id="cat-${cat._id}" class="bg-white text-slate-600 border border-pink-100 px-5 py-2.5 rounded-2xl text-xs font-medium whitespace-nowrap shadow-xs transition-all">
                            ${catName}
                        </button>
                    `;
                });
            }
        }

        function filterMainCategory(catId) {
            selectedMainCat = catId;
            document.querySelectorAll('#main-category-menu button').forEach(b => {
                b.className = "bg-white text-slate-600 border border-pink-100 px-5 py-2.5 rounded-2xl text-xs font-medium whitespace-nowrap shadow-xs transition-all";
            });
            const activeBtn = document.getElementById(`cat-${catId}`);
            if (activeBtn) activeBtn.className = "luxury-gradient text-white px-5 py-2.5 rounded-2xl text-xs font-semibold whitespace-nowrap luxury-glow transition-all";
            renderProducts();
        }

        function renderProducts() {
            const container = document.getElementById('shop-container');
            container.innerHTML = '';

            let filtered = allProducts;
            if (selectedMainCat !== 'all') {
                filtered = filtered.filter(p => {
                    const pCatId = p.category_id || p.category;
                    return pCatId && pCatId.toString().trim() === selectedMainCat.toString().trim();
                });
            }

            if (filtered.length === 0) {
                container.innerHTML = `<p class="col-span-2 text-center text-slate-400 my-16 text-xs">🌸 ပစ္စည်းများ မရှိသေးပါဗျာ။</p>`;
                return;
            }

            filtered.forEach(p => {
                let imageUrl = 'https://placehold.co/300x300?text=S%26S7+Fashion';
                let isVideo = false;

                if (p.colors?.[0]?.media?.[0]?.file_id) {
                    const m = p.colors[0].media[0];
                    imageUrl = `${API_URL}/api/image/${m.file_id}`;
                    isVideo = m.type === 'video';
                } else if (p.file_id) {
                    imageUrl = `${API_URL}/api/image/${p.file_id}`;
                    isVideo = p.type === 'video';
                }

                const mediaTag = isVideo 
                    ? `<div class="relative w-full h-44 overflow-hidden rounded-2xl mb-2.5 bg-slate-900 flex items-center justify-center"><video src="${imageUrl}" muted loop autoplay playsinline class="w-full h-full object-cover pointer-events-none"></video><span class="absolute top-2 right-2 bg-black/60 text-white text-[8px] px-1.5 py-0.5 rounded-md font-bold tracking-wider">🎥 VIDEO</span></div>`
                    : `<img src="${imageUrl}" class="w-full h-44 object-cover rounded-2xl mb-2.5 bg-slate-50">`;

                container.innerHTML += `
                    <div onclick="openDetailModal('${p._id}')" class="bg-white p-3 rounded-3xl shadow-xs border border-pink-50 flex flex-col justify-between cursor-pointer active:scale-98 transition-all">
                        <div>
                            ${mediaTag}
                            <h3 class="font-bold text-xs text-slate-800 line-clamp-1 px-1">${p.name || 'No Name'}</h3>
                            <p class="text-[11px] text-slate-400 line-clamp-2 mt-1 px-1 leading-relaxed">${p.description || ''}</p>
                        </div>
                        <div class="mt-3 border-t border-slate-50 pt-2 px-1 flex justify-end">
                            <span class="text-[9px] text-violet-500 font-bold bg-violet-50 px-2 py-1 rounded-md">အသေးစိတ်ကြည့်ရန် ✨</span>
                        </div>
                    </div>
                `;
            });
        }

        function openDetailModal(productId) {
            const product = allProducts.find(p => p._id === productId);
            if (!product) return;

            document.getElementById('detail-title').innerText = product.name || 'No Name';
            document.getElementById('detail-desc').innerText = product.description || 'အညွှန်းမရှိပါ။';
            document.getElementById('detail-add-btn').setAttribute('onclick', `addToCartFromDetail('${product._id}', '${product.name || "Item"}')`);

            const sliderContainer = document.getElementById('detail-media-slider');
            sliderContainer.innerHTML = '';
            let mediaList = [];

            if (product.colors && Array.isArray(product.colors)) {
                product.colors.forEach(c => {
                    if (c.media && Array.isArray(c.media)) {
                        c.media.forEach(m => { if (m.file_id) mediaList.push(m); });
                    }
                });
            }
            if (mediaList.length === 0 && product.file_id) {
                mediaList.push({ file_id: product.file_id, type: product.type || 'image' });
            }

            if (mediaList.length > 0) {
                mediaList.forEach(m => {
                    const mediaUrl = `${API_URL}/api/image/${m.file_id}`;
                    let slideHtml = `<div class="w-full h-full flex-shrink-0 snap-center relative">`;
                    if (m.type === 'video') {
                        slideHtml += `<video src="${mediaUrl}" controls playsinline autoplay class="w-full h-full object-cover bg-black"></video>`;
                    } else {
                        slideHtml += `<img src="${mediaUrl}" class="w-full h-full object-cover">`;
                    }
                    slideHtml += `</div>`;
                    sliderContainer.innerHTML += slideHtml;
                });
                document.getElementById('swipe-badge').classList.toggle('hidden', mediaList.length <= 1);
            } else {
                sliderContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-slate-400 text-xs bg-slate-900">No Image</div>`;
                document.getElementById('swipe-badge').classList.add('hidden');
            }

            document.getElementById('detail-modal').classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media-slider').innerHTML = '';
        }

        function addToCartFromDetail(id, name) {
            addToCart(id, name);
            closeDetailModal();
            toggleCartModal(); 
        }

        function addToCart(id, name) {
            let item = cart.find(x => x.id === id);
            if (item) { item.qty++; } else { cart.push({ id, name, qty: 1 }); }
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        // စျေးနှုန်းလုံးဝမပါဘဲ ရွေးထားသည့်ပစ္စည်းစာရင်းနှင့် အရေအတွက်ကိုသာ ပြသပေးမည့် UI စနစ်
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-center text-xs text-slate-400 py-8">ခြင်းတောင်းထဲမှာ ပစ္စည်းမရှိသေးပါရှင် 🌸</p>`;
                return;
            }

            cart.forEach(item => {
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-pink-50/40 p-4 rounded-2xl border border-pink-100/40 shadow-2xs">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-xl bg-gradient-to-tr from-pink-400 to-violet-400 flex items-center justify-center text-white text-xs font-bold">👗</div>
                            <div>
                                <p class="font-bold text-xs text-slate-700">${item.name}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="bg-pink-500 text-white px-3 py-1 rounded-xl text-[11px] font-extrabold shadow-2xs">x ${item.qty}</span>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        loadShopData();
    </script>
</body>
</html>
