<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S7 Fashion Online Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm mb-6">
        <div>
            <h1 class="text-xl font-bold text-indigo-600">🛍️ S&S7 Fashion</h1>
            <p id="user-greeting" class="text-xs text-gray-500 mt-1">မင်္ဂလာပါ ဝယ်သူတော်ကြီး 🙏</p>
        </div>
        <div class="relative bg-indigo-50 p-3 rounded-xl cursor-pointer" onclick="toggleCartModal()">
            <span class="text-xl">🛒</span>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </div>

    <div id="shop-container" class="grid grid-cols-2 gap-4">
        <p id="loading-text" class="col-span-2 text-center text-gray-400 my-10 text-sm">ပစ္စည်းများကို ဆွဲယူနေပါသည်...</p>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 shadow-xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-lg font-bold">🛒 ဝယ်ယူမည့်စာရင်း</h2>
                <button onclick="toggleCartModal()" class="text-gray-400 text-xl font-bold">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div class="border-t mt-4 pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>စုစုပေါင်းကျသင့်ငွေ:</span>
                    <span id="cart-total">0 MMK</span>
                </div>
                <button onclick="checkoutOrder()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-lg hover:bg-indigo-700 active:scale-95 transition-all">
                    ✅ အော်ဒါတင်မည်
                </button>
            </div>
        </div>
    </div>

    <script>
        // 🔗 ⚠️ သင့်ရဲ့ Serveo လင့်ကို ဒီနေရာမှာ ပြောင်းထည့်ပေးပါဗျာ
        const API_URL = "https://your-link.serveo.net"; 
        
        let cart = [];
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `မင်္ဂလာပါ ${tg.initDataUnsafe.user.first_name} 🙏`;
        }

        async function loadProducts() {
            try {
                const response = await fetch(`${API_URL}/api/products`);
                const products = await response.json();
                const container = document.getElementById('shop-container');
                document.getElementById('loading-text').classList.add('hidden');

                if (products.length === 0) {
                    container.innerHTML = `<p class="col-span-2 text-center text-gray-400 my-10">ဆိုင်ထဲတွင် ပစ္စည်းမရှိသေးပါဗျာ။</p>`;
                    return;
                }

                products.forEach(p => {
                    const fileId = p.colors[0]?.media[0]?.file_id;
                    const imageUrl = fileId ? `${API_URL}/api/image/${fileId}` : 'https://placehold.co/300x300?text=No+Image';

                    container.innerHTML += `
                        <div class="bg-white p-3 rounded-2xl shadow-xs border border-gray-100 flex flex-col justify-between">
                            <img src="${imageUrl}" class="w-full h-40 object-cover rounded-xl mb-2 bg-gray-50">
                            <div>
                                <h3 class="font-bold text-sm line-clamp-1">${p.name}</h3>
                                <p class="text-xs text-gray-400 line-clamp-2 mt-1">${p.description}</p>
                            </div>
                            <div class="mt-3">
                                <span class="text-indigo-600 font-bold text-sm block mb-2">In-Stock</span>
                                <button onclick="addToCart('${p._id}', '${p.name}', 10000)" class="w-full bg-gray-900 text-white text-xs py-2 rounded-xl font-medium active:bg-indigo-600 transition-colors">
                                    + ခြင်းတောင်းထဲထည့်
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('loading-text').innerText = "⚠️ ဆာဗာနှင့် ချိတ်ဆက်၍မရပါ (API Off နေနိုင်ပါသည်)";
            }
        }

        function addToCart(id, name, price) {
            let item = cart.find(x => x.id === id);
            if (item) { item.qty++; } else { cart.push({ id, name, price, qty: 1 }); }
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                        <div>
                            <p class="font-bold text-sm">${item.name}</p>
                            <p class="text-xs text-gray-400">${item.price.toLocaleString()} MMK</p>
                        </div>
                        <span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-lg text-xs font-bold">x ${item.qty}</span>
                    </div>
                `;
            });
            document.getElementById('cart-total').innerText = total.toLocaleString() + " MMK";
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        async function checkoutOrder() {
            if (cart.length === 0) return alert("ခြင်းတောင်းထဲတွင် ပစ္စည်းမရှိသေးပါဗျာ။");
            let userId = tg.initDataUnsafe?.user?.id || 12345678;
            let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const orderPayload = {
                user_id: parseInt(userId),
                items: cart,
                total_price: totalPrice
            };

            try {
                const response = await fetch(`${API_URL}/api/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderPayload)
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("🎉 မှာယူမှု အောင်မြင်ပါသည်ဗျာ။");
                    cart = []; updateCartUI(); toggleCartModal(); tg.close();
                }
            } catch (error) {
                alert("❌ အော်ဒါတင်မရပါ၊ ဆာဗာချိတ်ဆက်မှု စစ်ဆေးပေးပါ။");
            }
        }
        loadProducts();
    </script>
</body>
</html>
