<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&S7 Fashion - High Fashion Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Pyidaungsu:wght@400;700&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', 'Pyidaungsu', sans-serif; 
            background: #fafafa;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .premium-dark { background: #111111; }
        .glass-blur { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="p-4 min-h-screen text-neutral-900 pb-24 selection:bg-neutral-200">

    <div class="flex justify-between items-center glass-blur p-4 rounded-2xl border border-neutral-100 mb-6 sticky top-0 z-40 shadow-xs">
        <div>
            <h1 class="text-xl font-black tracking-widest text-neutral-900 uppercase">S&S7 FASHION</h1>
            <p id="user-greeting" class="text-[10px] text-neutral-400 font-medium tracking-wide mt-0.5">COLLECTION 2026</p>
        </div>
        <div class="relative bg-neutral-900 text-white p-3 rounded-xl cursor-pointer active:scale-95 transition-all" onclick="toggleCartModal()">
            <span class="text-sm font-bold">🛒 ခြင်းတောင်း</span>
            <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
        </div>
    </div>

    <div id="landing-view" class="space-y-4">
        <div class="mb-4 px-1">
            <h2 class="text-sm font-bold text-neutral-400 uppercase tracking-widest">ပင်မကဏ္ဍများ (Categories)</h2>
            <p class="text-xs text-neutral-500 mt-1">ကြည့်ရှုလိုသော ဖက်ရှင်ကဏ္ဍတစ်ခုကို ရွေးချယ်ပေးပါရှင်။</p>
        </div>
        
        <div id="category-cards-grid" class="grid grid-cols-1 gap-3.5">
            <p id="category-loading" class="text-center text-neutral-400 font-medium my-12 text-xs animate-pulse">
                🌸 မီနူးများကို ဖတ်ရှုနေပါသည်...
            </p>
        </div>
    </div>

    <div id="product-view" class="hidden">
        <div class="flex items-center justify-between mb-5 px-1">
            <button onclick="backToMainMenu()" class="flex items-center gap-1.5 text-xs font-bold text-neutral-500 bg-neutral-100 px-3 py-2 rounded-xl active:scale-95 transition-all">
                ← ပင်မမီနူးသို့
            </button>
            <h2 id="current-category-title" class="text-sm font-black text-neutral-900 tracking-wider uppercase bg-neutral-900 text-white px-3 py-1.5 rounded-xl">---</h2>
        </div>

        <div id="shop-container" class="grid grid-cols-2 gap-3.5"></div>
    </div>


    <div id="detail-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-end justify-center transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-t-[2rem] shadow-2xl max-h-[92vh] overflow-y-auto relative border-t border-neutral-100 flex flex-col">
            
            <div class="absolute top-4 right-4 z-50">
                <button onclick="closeDetailModal()" class="w-8 h-8 bg-white text-black shadow-lg rounded-full text-base font-bold flex items-center justify-center active:scale-90">&times;</button>
            </div>

            <div class="relative w-full h-[50vh] bg-neutral-900">
                <div id="detail-media-slider" class="w-full h-full flex overflow-x-auto snap-x snap-mandatory no-scrollbar">
                    </div>
                <div id="swipe-badge" class="absolute bottom-4 left-4 bg-black/60 text-white text-[9px] px-2.5 py-1 rounded-md font-medium tracking-widest hidden uppercase">
                    ← Swipe Gallery →
                </div>
            </div>

            <div class="p-6 bg-white relative z-10 -mt-4 rounded-t-2xl flex-1 flex flex-col justify-between">
                <div>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-neutral-400 bg-neutral-50 border border-neutral-200/60 px-2 py-0.5 rounded-sm">Premium Cut</span>
                    <h2 id="detail-title" class="text-xl font-extrabold text-neutral-900 tracking-tight leading-snug mt-2">Product Title</h2>
                    
                    <div class="mt-4 border-t border-neutral-100 pt-4">
                        <p id="detail-desc" class="text-xs text-neutral-600 leading-relaxed whitespace-pre-line tracking-wide font-normal">
                            Product Description text...
                        </p>
                    </div>
                </div>

                <div class="mt-6 pt-4 border-t border-neutral-100">
                    <button id="detail-add-btn" class="w-full premium-dark text-white py-4 rounded-xl font-bold tracking-widest hover:opacity-90 active:scale-98 transition-all text-xs uppercase">
                        🖤 ခြင်းတောင်းထဲထည့်မည်
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-[2rem] p-6 shadow-2xl max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5 border-b border-neutral-100 pb-3">
                <h2 class="text-xs font-black tracking-wider uppercase text-neutral-800 flex items-center gap-2">🛍️ ရွေးချယ်ထားသော အထည်များ</h2>
                <button onclick="toggleCartModal()" class="text-neutral-400 text-2xl font-bold active:scale-90">&times;</button>
            </div>
            
            <div id="cart-items" class="space-y-3 max-h-[48vh] overflow-y-auto pr-1 no-scrollbar"></div>
            
            <div class="border-t border-neutral-100 mt-5 pt-4">
                <button onclick="toggleCartModal()" class="w-full premium-dark text-white py-3.5 rounded-xl font-bold active:scale-95 transition-all text-xs uppercase tracking-widest">
                    ✨ ပစ္စည်း ထပ်မံကြည့်ရှုမည်
                </button>
            </div>
        </div>
    </div>

    <script>
        // 🔗 ⚠️ ဆာဗာလင့်ခ် ထည့်ရန်နေရာ
        const API_URL = "https://myshop-1833.onrender.com"; 
        
        let allProducts = [];
        let mainCategories = [];
        let cart = [];
        
        let tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `မင်္ဂလာပါ ${tg.initDataUnsafe.user.first_name} ✨`;
        }

        // 🚀 Anti-Freeze Data Fetcher
        async function loadShopData() {
            try {
                const catResponse = await fetch(`${API_URL}/api/categories`);
                if (catResponse.ok) mainCategories = await catResponse.json();
            } catch (e) { console.log("Category Fetch Error"); }

            try {
                const prodResponse = await fetch(`${API_URL}/api/products`);
                allProducts = await prodResponse.json();
                allProducts.sort((a, b) => (b._id || '').toString().localeCompare((a._id || '').toString()));
            } catch (error) {
                document.getElementById('category-loading').innerText = "⚠️ ဆာဗာနှင့် ချိတ်ဆက်၍မရပါ";
                return;
            }

            renderLandingCategories();
        }

        // 📁 MongoDB ပင်မ Menu ကြီးများကို ဇိမ်ခံဒီဇိုင်း ကတ်ပြားကြီးများဖြင့် အရင်ပြသခြင်း
        function renderLandingCategories() {
            const grid = document.getElementById('category-cards-grid');
            grid.innerHTML = '';

            if(mainCategories.length === 0) {
                grid.innerHTML = `<p class="text-center text-neutral-400 text-xs py-8">ကဏ္ဍများ မရှိသေးပါဗျာ။</p>`;
                return;
            }

            mainCategories.forEach((cat, index) => {
                const catName = cat.name || cat.title || "Collection";
                
                // Luxury Clean Layout Category Block
                grid.innerHTML += `
                    <div onclick="selectCategory('${cat._id}', '${catName}')" class="bg-white border border-neutral-200/70 rounded-2xl p-5 flex justify-between items-center cursor-pointer hover:border-black active:scale-98 transition-all shadow-2xs relative overflow-hidden group">
                        <div class="z-10">
                            <span class="text-[9px] font-mono text-neutral-400 block tracking-widest mb-1">0${index + 1} / COLLECTION</span>
                            <h3 class="font-extrabold text-sm text-neutral-900 tracking-wider uppercase">${catName}</h3>
                        </div>
                        <div class="flex items-center gap-2 z-10">
                            <span class="text-[10px] text-neutral-400 font-bold tracking-widest uppercase group-hover:text-black transition-colors">EXPLORE</span>
                            <span class="text-neutral-300 group-hover:translate-x-1 transition-transform">→</span>
                        </div>
                    </div>
                `;
            });
        }

        // 🎯 Menu တစ်ခုကို နှိပ်လိုက်မှ သက်ဆိုင်ရာ Product များကို စစ်ထုတ်ပြသသည့်စနစ်
        function selectCategory(catId, catName) {
            document.getElementById('current-category-title').innerText = catName;
            
            const container = document.getElementById('shop-container');
            container.innerHTML = '';

            // Filter products matching clicked category _id
            let filtered = allProducts.filter(p => {
                const pCatId = p.category_id || p.category;
                return pCatId && pCatId.toString().trim() === catId.toString().trim();
            });

            if (filtered.length === 0) {
                container.innerHTML = `<p class="col-span-2 text-center text-neutral-400 my-16 text-xs">ဤကဏ္ဍတွင် ပစ္စည်းများ မရှိသေးပါရှင်။</p>`;
            } else {
                filtered.forEach(p => {
                    let imageUrl = 'https://placehold.co/400x500?text=S%26S7+Fashion';
                    let isVideo = false;

                    if (p.colors?.[0]?.media?.[0]?.file_id) {
                        const m = p.colors[0].media[0];
                        imageUrl = `${API_URL}/api/image/${m.file_id}`;
                        isVideo = m.type === 'video';
                    } else if (p.file_id) {
                        imageUrl = `${API_URL}/api/image/${p.file_id}`;
                        isVideo = p.type === 'video';
                    }

                    const mediaTag = isVideo 
                        ? `<div class="relative w-full h-52 overflow-hidden bg-neutral-100 flex items-center justify-center"><video src="${imageUrl}" muted loop autoplay playsinline class="w-full h-full object-cover pointer-events-none"></video></div>`
                        : `<img src="${imageUrl}" class="w-full h-52 object-cover bg-neutral-50">`;

                    container.innerHTML += `
                        <div onclick="openDetailModal('${p._id}')" class="bg-white border border-neutral-100 flex flex-col justify-between cursor-pointer group">
                            <div class="overflow-hidden rounded-xl relative">
                                ${mediaTag}
                            </div>
                            <div class="py-2.5 px-1">
                                <h3 class="font-bold text-xs text-neutral-900 tracking-tight line-clamp-1">${p.name || 'Untitled'}</h3>
                                <p class="text-[10px] text-neutral-400 mt-0.5 tracking-widest uppercase">View Details</p>
                            </div>
                        </div>
                    `;
                });
            }

            // Smooth UI Switch View
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('product-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function backToMainMenu() {
            document.getElementById('product-view').classList.add('hidden');
            document.getElementById('landing-view').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 🔮 PREMIUM OVERHAULED MODAL DESIGN (PRODUCT-FIRST DETAILED SHEET)
        function openDetailModal(productId) {
            const product = allProducts.find(p => p._id === productId);
            if (!product) return;

            document.getElementById('detail-title').innerText = product.name || 'Untitled Piece';
            document.getElementById('detail-desc').innerText = product.description || 'အညွှန်း မဖော်ပြထားပါရှင်။';
            document.getElementById('detail-add-btn').setAttribute('onclick', `addToCartFromDetail('${product._id}', '${product.name || "Premium Item"}')`);

            const sliderContainer = document.getElementById('detail-media-slider');
            sliderContainer.innerHTML = '';
            let mediaList = [];

            if (product.colors && Array.isArray(product.colors)) {
                product.colors.forEach(c => {
                    if (c.media && Array.isArray(c.media)) {
                        c.media.forEach(m => { if (m.file_id) mediaList.push(m); });
                    }
                });
            }
            if (mediaList.length === 0 && product.file_id) {
                mediaList.push({ file_id: product.file_id, type: product.type || 'image' });
            }

            if (mediaList.length > 0) {
                mediaList.forEach(m => {
                    const mediaUrl = `${API_URL}/api/image/${m.file_id}`;
                    let slideHtml = `<div class="w-full h-full flex-shrink-0 snap-center relative">`;
                    if (m.type === 'video') {
                        slideHtml += `<video src="${mediaUrl}" controls playsinline autoplay class="w-full h-full object-cover bg-black"></video>`;
                    } else {
                        slideHtml += `<img src="${mediaUrl}" class="w-full h-full object-cover">`;
                    }
                    slideHtml += `</div>`;
                    sliderContainer.innerHTML += slideHtml;
                });
                document.getElementById('swipe-badge').classList.toggle('hidden', mediaList.length <= 1);
            } else {
                sliderContainer.innerHTML = `<div class="w-full h-full flex items-center justify-center text-neutral-400 text-xs bg-neutral-900">No Image</div>`;
                document.getElementById('swipe-badge').classList.add('hidden');
            }

            document.getElementById('detail-modal').classList.remove('hidden');
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function closeDetailModal() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('detail-media-slider').innerHTML = '';
        }

        function addToCartFromDetail(id, name) {
            addToCart(id, name);
            closeDetailModal();
            toggleCartModal(); 
        }

        function addToCart(id, name) {
            let item = cart.find(x => x.id === id);
            if (item) { item.qty++; } else { cart.push({ id, name, qty: 1 }); }
            updateCartUI();
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.reduce((sum, item) => sum + item.qty, 0);
            const cartItemsContainer = document.getElementById('cart-items');
            cartItemsContainer.innerHTML = '';
            
            if (cart.length === 0) {
                cartItemsContainer.innerHTML = `<p class="text-center text-xs text-neutral-400 py-12 font-medium">ခြင်းတောင်းထဲမှာ အထည်မရှိသေးပါရှင် 🖤</p>`;
                return;
            }

            cart.forEach(item => {
                cartItemsContainer.innerHTML += `
                    <div class="flex justify-between items-center bg-neutral-50 p-4 rounded-xl border border-neutral-200/50">
                        <div class="flex items-center gap-3">
                            <span class="text-base">✨</span>
                            <p class="font-bold text-xs text-neutral-800">${item.name}</p>
                        </div>
                        <span class="bg-neutral-900 text-white px-3 py-1 rounded-md text-[10px] font-black">QTY: ${item.qty}</span>
                    </div>
                `;
            });
        }

        function toggleCartModal() {
            document.getElementById('cart-modal').classList.toggle('hidden');
        }

        loadShopData();
    </script>
</body>
</html>
